name: Sync to Hugging Face Space
on:
  push:
    branches:
      - main
      - hf-space-deployment

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push https://Dkb988:$HF_TOKEN@huggingface.co/spaces/Dkb988/pulse-ai-backend HEAD:main --force
