services:
  # ── Backend (FastAPI) ──
  - type: web
    name: pulse-ai-backend
    runtime: python
    region: oregon
    plan: starter          # 512 MB RAM / 0.5 CPU – upgrade to "standard" if OOM
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip &&
      pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "https://pulse-ai-frontend.onrender.com,http://localhost:5173"
      # Set these in Render dashboard as secret env vars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false

  # ── Frontend (Vite static site) ──
  - type: web
    name: pulse-ai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
